<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT:bit</title>

<style>
.product-slider-wrapper {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
}

/* každý slider polovica */
.product-slider {
    position: relative;
    width: 50%;
    height: 350px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* ===== GLOBAL ===== */
html { scroll-behavior: smooth; }
body { margin: 0; font-family: Arial, sans-serif; background: white; }

/* ===== NAVBAR ===== */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: green;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.hamburger {
    position: absolute;
    left: 15px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    gap: 5px;
}
.hamburger div { width: 25px; height: 3px; background: white; }

.logo { font-weight: bold; font-size: 24px; color: white; }

.nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
    position: absolute;
    right: 20px;
}
.nav-links li a { color: white; text-decoration: none; font-weight: bold; }

@media (max-width: 768px) {
    .nav-links {
        display: none;
        flex-direction: column;
        background: green;
        position: absolute;
        top: 60px;
        right: 20px;
        padding: 10px;
        border-radius: 5px;
    }
    .nav-links.show { display: flex; }
}

/* ===== HERO SLIDESHOW ===== */
.hero {
    height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    overflow: hidden;
}

.slideshow-container {
    position: absolute;
    inset: 0;
    z-index: 0;
}

.slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: brightness(45%);
    opacity: 0;
    transition: opacity 1s ease;
}

.slide.active {
    opacity: 1;
}

.hero h1,
.hero .btn {
    position: relative;
    z-index: 2;
}

.btn {
    margin-top: 20px;
    padding: 12px 20px;
    background: green;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}

/* ===== PROJECT ===== */
section { padding: 100px 20px; }

.container { max-width: 1000px; margin: auto; }

.project-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 30px;
}

.card {
    background: rgba(0,0,0,0.05);
    border: 2px solid rgba(0,0,0,0.3);
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #111;
    font-weight: bold;
    transition: 0.3s;
    border-radius: 0;
}

.card:hover {
    transform: translateY(-5px);
}

.product-slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease;
}

.product-slide.active {
    opacity: 1;
}

/* ===== FADE ===== */
.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.8s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* ===== FOOTER ===== */
.footer {
    background: black;
    color: white;
    padding: 40px;
    text-align: center;
}

.icons img {
    width: 35px;
    height: 35px;
    filter: invert(1);
}

.icons {
    display: flex;
    justify-content: center;
    gap: 20px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="hamburger" id="hamburger"><div></div><div></div><div></div></div>
  <div class="logo">IoT:bit</div>
  <ul class="nav-links" id="nav-links">
    <li><a href="#home">Domov</a></li>
    <li><a href="#project">O projekte</a></li>
    <li><a href="stores.html">Kamenné predajne</a></li>
    <li><a href="sale.html">Predpredaj</a></li>
    <li><a href="about.html">O nás</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="home" class="hero fade">

  <div class="slideshow-container">
    <div class="slide active" style="background-image:url('1.jpg')"></div>
    <div class="slide" style="background-image:url('2.webp')"></div>
    <div class="slide" style="background-image:url('3.webp')"></div>
  </div>

  <h1>Discovering the distance that movement hides.</h1>
  <a class="btn" href="#project">Zoznámte sa s IoT:bit</a>
</section>

<!-- PROJECT -->
<section id="project" class="fade">

<div class="container">

  <div class="project-cards">
    <a class="card" href="stores.html">Kamenné predajne</a>
    <a class="card" href="sale.html">Predpredaj</a>
    <a class="card" href="about.html">O nás</a>
  </div>

  <div class="product-slider-wrapper">

  <!-- ĽAVÝ slider -->
  <div class="product-slider" id="slider-left">
    <img class="product-slide active" src="IoT2.webp">
    <img class="product-slide" src="IoT3.webp">
    <img class="product-slide" src="IoT4.webp">
  </div>

  <!-- PRAVÝ slider -->
  <div class="product-slider" id="slider-right">
    <img class="product-slide active" src="IoT5.jpg">
    <img class="product-slide" src="IoT6.jpg">
    <img class="product-slide" src="IoT7.jpg">
  </div>

  </div>
</div>

</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-content">
        <h3>Podporte nás</h3>
        <p>Sledujte nás na sociálnych sieťach a zostaňte v kontakte.</p>

        <div class="icons">
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook"></a>
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" alt="Instagram"></a>
            <a href="mailto:info@iotbit.sk"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email"></a>
        </div>
    </div>
</footer>

<script>
/* HERO SLIDES */
let slideIndex = 0;
const slides = document.querySelectorAll('.slide');

function showSlides(){
  slides.forEach(s => s.classList.remove('active'));
  slides[slideIndex].classList.add('active');
  slideIndex = (slideIndex + 1) % slides.length;
}
showSlides();
setInterval(showSlides, 5000);

function createSlider(selector, interval) {
    let index = 0;
    const slides = document.querySelectorAll(selector + ' .product-slide');

    function show() {
        slides.forEach(s => s.classList.remove('active'));
        slides[index].classList.add('active');
        index = (index + 1) % slides.length;
    }

    show();
    setInterval(show, interval);
}

/* ľavý slider */
createSlider('#slider-left', 3000);

/* pravý slider */
createSlider('#slider-right', 3000);

/* HAMBURGER */
document.getElementById('hamburger')
.addEventListener('click', () => {
  document.getElementById('nav-links').classList.toggle('show');
});

/* FADE */
const obs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('show');
  });
});

document.querySelectorAll('.fade').forEach(el=>obs.observe(el));
</script>

</body>
</html>
