<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predpredaj IoT:bit</title>

<style>

.footer {
    background: black;
    color: white;
    padding: 40px 20px;
    margin-top: 50px;
    text-align: center;
}

.footer-content h3 {
    font-size: 26px;
    margin-bottom: 10px;
}

.footer-content p {
    font-size: 18px;
    margin-bottom: 20px;
    color: #ccc;
}

.icons {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.icons img {
    width: 35px;
    height: 35px;
    filter: invert(1);
    transition: 0.3s;
}

.icons img:hover {
    transform: scale(1.2);
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
}

.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: green;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.hamburger {
    position: absolute;
    left: 15px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    gap: 5px;
}

.hamburger div {
    width: 25px;
    height: 3px;
    background: white;
}

.logo {
    font-weight: bold;
    font-size: 24px;
    color: white;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
    position: absolute;
    right: 20px;
}

.nav-links li a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

@media (max-width: 768px) {
    .nav-links {
        display: none;
        flex-direction: column;
        background: green;
        position: absolute;
        top: 60px;
        right: 20px;
        padding: 10px;
        border-radius: 5px;
    }

    .nav-links.show {
        display: flex;
    }
}

section {
    padding: 100px 20px;
}

.hero {
    height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(to bottom, #dfffe0, beige);
}

.hero h1 {
    font-size: 28px;
    max-width: 700px;
    margin-bottom: 20px;
}

.btn {
    margin-top: 20px;
    padding: 15px 25px;
    background: green;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.row {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 40px;
}

.video video, .product-img {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
}

.product-img {
    margin-top: 20px;
}

.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="hamburger" id="hamburger">
    <div></div><div></div><div></div>
  </div>
  <div class="logo">IoT:bit</div>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Domov</a></li>
    <li><a href="index.html#project">O projekte</a></li>
    <li><a href="stores.html">Kamenné predajne</a></li>
    <li><a href="sale.html">Predpredaj</a></li>
    <li><a href="about.html">O nás</a></li>
  </ul>
</nav>

<section class="hero fade">
  <h1>Zlacnený predpredaj IoT1</h1>
  <p>Objednajte si náš prvý prototyp za špeciálnu predpredajovú cenu. Limitovaná ponuka pre prvých záujemcov.</p>
  <a href="#" class="btn">Kúpiť teraz</a>
</section>

<section class="fade">
<div class="container">

  <div class="row">
    <video controls>
      <source src="IMG_0505.mp4" type="video/mp4">
    </video>

    <img src="IMG_0500.jpeg" alt="IoT1 prototyp" class="product-img">
  </div>

</div>
</section>

<script>
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('nav-links');

hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('show');
});

/* FADE IN */
const elements = document.querySelectorAll('.fade');
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add('show');
        }
    });
});
elements.forEach(el => observer.observe(el));
</script>

<footer class="footer">
    <div class="footer-content">
        <h3>Podporte nás</h3>
        <p>Sledujte nás na sociálnych sieťach a zostaňte v kontakte.</p>

        <div class="icons">
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook"></a>
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" alt="Instagram"></a>
            <a href="mailto:info@iotbit.sk"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email"></a>
        </div>
    </div>
</footer>

</body>
</html>
